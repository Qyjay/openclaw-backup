<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Nano Banana API 图像生成器</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
 .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
 .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
 .header h1 { font-size: 2em; margin-bottom: 10px; }
 .header p { opacity: 0.9; font-size: 1.1em; }
 .content { padding: 30px; }
 .section { margin-bottom: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px; }
 .section-title { font-size: 1.3em; font-weight: 600; margin-bottom: 15px; color: #333; display: flex; align-items: center; }
 .section-title::before { content: ""; display: inline-block; width: 4px; height: 24px; background: #667eea; margin-right: 10px; border-radius: 2px; }
 .form-group { margin-bottom: 20px; }
 label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; }
 input[type="text"], input[type="password"], textarea, select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; transition: border-color 0.3s; }
 input:focus, textarea:focus, select:focus { outline: none; border-color: #667eea; }
 textarea { resize: vertical; min-height: 120px; font-family: inherit; }
 .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
 .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
 .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
 .btn-secondary { background: #6c757d; color: white; }
 .btn-batch { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
 .btn-batch:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(240,147,251,0.4); }
 .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
 .image-upload-area { border: 2px dashed #667eea; border-radius: 10px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s; background: white; }
 .image-upload-area:hover { background: #f0f4ff; }
 .image-upload-area.dragover { background: #e6edff; border-color: #764ba2; }
 #imageInput { display: none; }
 .reference-images { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
 .reference-image-item { position: relative; border: 2px solid #e0e0e0; border-radius: 10px; overflow: hidden; background: white; }
 .reference-image-item img { width: 100%; height: 200px; object-fit: cover; }
 .reference-image-label { position: absolute; top: 10px; left: 10px; background: rgba(102,126,234,0.9); color: white; padding: 5px 10px; border-radius: 5px; font-weight: 600; font-size: 14px; }
 .reference-image-remove { position: absolute; top: 10px; right: 10px; background: rgba(255,59,48,0.9); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 18px; }
 .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
 .batch-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
 .result-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; transition: transform 0.3s; }
 .result-card:hover { transform: translateY(-5px); }
 .result-card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 15px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
 .result-card-status { font-size: 12px; padding: 4px 8px; border-radius: 12px; background: rgba(255,255,255,0.2); }
 .result-card-status.success { background: #28a745; }
 .result-card-status.error { background: #dc3545; }
 .result-card-status.loading { background: #ffc107; color: #333; }
 .result-card-body { padding: 15px; }
 .result-card-prompt { font-size: 13px; color: #666; margin-bottom: 10px; max-height: 60px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
 .result-card-image { width: 100%; border-radius: 8px; margin-bottom: 10px; }
 .result-card-actions { display: flex; gap: 8px; }
 .result-card-actions .btn { flex: 1; padding: 8px 12px; font-size: 13px; }
 .result-card .loading-placeholder { height: 200px; display: flex; align-items: center; justify-content: center; background: #f8f9fa; border-radius: 8px; margin-bottom: 10px; }
 .result-card .error-message { color: #dc3545; font-size: 13px; padding: 15px; background: #fff5f5; border-radius: 8px; }
 .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; }
 .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
 .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
 .usage-tip { background: #fff3cd; border: 1px solid #ffeaa7; padding: 15px; border-radius: 8px; margin-top: 15px; }
 .usage-tip strong { color: #856404; }
 .btn-group { display: flex; gap: 10px; margin-top: 20px; }
 .download-btn { background: #28a745; color: white; }
 .download-btn:hover { background: #218838; }
 .api-status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-left: 10px; }
 .api-status.connected { background: #28a745; }
 .api-status.disconnected { background: #dc3545; }
 .progress-bar { height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
 .progress-bar-fill { height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: width 0.3s; }
 .progress-text { margin-top: 8px; font-size: 14px; color: #666; text-align: center; }
 .batch-summary { display: flex; justify-content: center; gap: 30px; margin-top: 15px; }
 .batch-summary-item { text-align: center; }
 .batch-summary-item .number { font-size: 24px; font-weight: bold; }
 .batch-summary-item .label { font-size: 12px; color: #888; }
 .batch-summary-item.success .number { color: #28a745; }
 .batch-summary-item.error .number { color: #dc3545; }
 .batch-summary-item.total .number { color: #667eea; }
 .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
 @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
 .prompt-preview { margin-top: 15px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
 .prompt-preview-header { background: #f8f9fa; padding: 10px 15px; font-weight: 600; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; }
 .prompt-preview-close { background: none; border: none; font-size: 18px; cursor: pointer; color: #888; }
 .prompt-preview-list { max-height: 300px; overflow-y: auto; }
 .prompt-preview-item { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; display: flex; gap: 12px; }
 .prompt-preview-number { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; }
 .prompt-preview-text { flex: 1; font-size: 14px; color: #333; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
 .prompt-preview-empty { padding: 30px; text-align: center; color: #888; }
 </style>
</head>
<body>
 <div class="container">
 <div class="header">
 <h1>🍌 Nano Banana 图像生成器</h1>
 <p>文生图 & 参考图生图 | 支持批量并行生成</p>
 </div>
 <div class="content">
 <div class="section">
 <div class="section-title">🔑 API 配置 <span class="api-status" id="apiStatus"></span></div>
 <div class="form-group">
 <label for="apiKey">Gemini API Key：</label>
 <input type="password" id="apiKey" placeholder="请输入你的 Gemini API Key">
 </div>
 <button class="btn btn-secondary" onclick="saveApiKey()">保存</button>
 <div id="apiKeyStatus"></div>
 </div>
 <div class="section">
 <div class="section-title">✍️ 提示词（批量：用序号 1. 2. 3. 划分）</div>
 <div class="form-group">
 <textarea id="promptText" placeholder="例如：
1. 一只可爱的橘猫在阳光下打盹
2. 一只黑色拉布拉多在草地上奔跑
3. 一只白色波斯猫优雅地坐在窗台上"></textarea>
 </div>
 <div class="form-group" style="display:flex;align-items:center;gap:15px;">
 <button class="btn btn-secondary" onclick="parseAndShowPrompts()">🔍 预览</button>
 <span>识别到 <span id="promptCount" style="color:#667eea;font-weight:bold;">0</span> 条</span>
 </div>
 <div id="promptPreview" style="display:none;"></div>
 </div>
 <div class="section">
 <div class="section-title">🖼️ 参考图片（可选）</div>
 <div class="image-upload-area" id="uploadArea" onclick="document.getElementById('imageInput').click()">
 <p style="font-size:48px;margin-bottom:10px;">📤</p>
 <p style="font-size:18px;font-weight:600;">点击或拖拽图片到这里</p>
 <p style="color:#888;">支持 JPG、PNG、GIF，可上传多张</p>
 </div>
 <input type="file" id="imageInput" accept="image/*" multiple>
 <div class="reference-images" id="referenceImages"></div>
 </div>
 <div class="section">
 <div class="section-title">⚙️ 配置</div>
 <div class="config-grid">
 <div class="form-group">
 <label>纵横比：</label>
 <select id="aspectRatio">
 <option value="1:1">1:1</option><option value="4:3" selected>4:3</option><option value="3:4">3:4</option><option value="16:9">16:9</option><option value="9:16">9:16</option>
 </select>
 </div>
 <div class="form-group">
 <label>尺寸：</label>
 <select id="imageSize">
 <option value="512">512</option><option value="1K" selected>1K</option><option value="2K">2K</option>
 </select>
 </div>
 <div class="form-group">
 <label>每条生成数量：</label>
 <select id="imageCount">
 <option value="1" selected>1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
 </select>
 </div>
 </div>
 </div>
 <div class="btn-group">
 <button class="btn btn-primary" id="singleGenBtn" onclick="generateSingle()">🎨 单独生图</button>
 <button class="btn btn-batch" id="batchGenBtn" onclick="generateBatch()">🚀 批量生图</button>
 </div>
 <div id="resultArea"></div>
 </div>
 </div>
<script>
let referenceImagesData=[];let batchResults=[];let batchCompleted=0;let batchTotal=0;let currentMode='single';
window.onload=function(){loadApiKey();setupImageUpload();setupPromptCounter();};
function setupPromptCounter(){const el=document.getElementById('promptText');el.addEventListener('input',()=>{document.getElementById('promptCount').textContent=getPrompts().length;});document.getElementById('promptCount').textContent=getPrompts().length;}
function getPrompts(){const t=document.getElementById('promptText').value;const p=/(?:^|\n)\s*(\d+)\s*[.、:：)）]\s*/g;const m=[];let match;while((match=p.exec(t))!==null){m.push({index:match.index,endIndex:match.index+match[0].length});}if(m.length===0){const tr=t.trim();return tr?[tr]:[];}const r=[];for(let i=0;i<m.length;i++){const s=m[i].endIndex;const e=(i+1<m.length)?m[i+1].index:t.length;const c=t.substring(s,e).trim();if(c)r.push(c);}return r;}
function parseAndShowPrompts(){const ps=getPrompts();const el=document.getElementById('promptPreview');if(!ps.length){el.innerHTML='<div class="prompt-preview"><div class="prompt-preview-header"><span>预览</span><button class="prompt-preview-close" onclick="document.getElementById(\'promptPreview\').style.display=\'none\'">×</button></div><div class="prompt-preview-empty">未识别到提示词</div></div>';el.style.display='block';return;}let h=ps.map((p,i)=>`<div class="prompt-preview-item"><div class="prompt-preview-number">${i+1}</div><div class="prompt-preview-text">${escapeHtml(p)}</div></div>`).join('');el.innerHTML=`<div class="prompt-preview"><div class="prompt-preview-header"><span>预览（${ps.length}条）</span><button class="prompt-preview-close" onclick="document.getElementById('promptPreview').style.display='none'">×</button></div><div class="prompt-preview-list">${h}</div></div>`;el.style.display='block';}
function saveApiKey(){const k=document.getElementById('apiKey').value.trim();if(!k){showAlert('apiKeyStatus','请输入 API Key','error');return;}localStorage.setItem('bananaApiKey',k);showAlert('apiKeyStatus','已保存！','success');updateApiStatus(true);}
function loadApiKey(){const k=localStorage.getItem('bananaApiKey');if(k){document.getElementById('apiKey').value=k;updateApiStatus(true);}else{updateApiStatus(false);}}
function updateApiStatus(c){const s=document.getElementById('apiStatus');s.className='api-status '+(c?'connected':'disconnected');}
function setupImageUpload(){const u=document.getElementById('uploadArea');const i=document.getElementById('imageInput');u.addEventListener('dragover',e=>{e.preventDefault();u.classList.add('dragover');});u.addEventListener('dragleave',()=>{u.classList.remove('dragover');});u.addEventListener('drop',e=>{e.preventDefault();u.classList.remove('dragover');handleImageFiles(e.dataTransfer.files);});i.addEventListener('change',e=>{handleImageFiles(e.target.files);});}
function handleImageFiles(files){Array.from(files).forEach(f=>{if(!f.type.startsWith('image/'))return;const r=new FileReader();r.onload=e=>{referenceImagesData.push({data:e.target.result.split(',')[1],mimeType:f.type,preview:e.target.result});renderReferenceImages();};r.readAsDataURL(f);});}
function renderReferenceImages(){const c=document.getElementById('referenceImages');c.innerHTML='';referenceImagesData.forEach((img,i)=>{const d=document.createElement('div');d.className='reference-image-item';d.innerHTML=`<img src="${img.preview}"><div class="reference-image-label">图${i+1}</div><button class="reference-image-remove" onclick="removeReferenceImage(${i})">×</button>`;c.appendChild(d);});}
function removeReferenceImage(i){referenceImagesData.splice(i,1);renderReferenceImages();}
function getImageCount(){return parseInt(document.getElementById('imageCount').value)||1;}
function getProxyUrl(){return'/api/generate';}
function setButtonsDisabled(d,t=''){document.getElementById('singleGenBtn').disabled=d;document.getElementById('batchGenBtn').disabled=d;if(d&&t){document.getElementById(currentMode==='single'?'singleGenBtn':'batchGenBtn').textContent=t;}else{document.getElementById('singleGenBtn').textContent='🎨 单独生图';document.getElementById('batchGenBtn').textContent='🚀 批量生图';}}
async function generateSingle(){currentMode='single';const k=localStorage.getItem('bananaApiKey');if(!k){showAlert('resultArea','请先配置 API Key','error');return;}const ps=getPrompts();if(!ps.length){showAlert('resultArea','请输入提示词','error');return;}const p=ps[0];const c=getImageCount();setButtonsDisabled(true,`生成中(0/${c})...`);batchResults=[];for(let i=0;i<c;i++)batchResults.push({id:i,prompt:p,promptIndex:0,imageIndex:i,status:'loading',imageData:null,error:null});batchCompleted=0;batchTotal=c;renderBatchResults();const promises=batchResults.map((_,i)=>generateOneImage(k,p,i));await Promise.allSettled(promises);setButtonsDisabled(false);}
async function generateBatch(){currentMode='batch';const k=localStorage.getItem('bananaApiKey');if(!k){showAlert('resultArea','请先配置 API Key','error');return;}const ps=getPrompts();if(!ps.length){showAlert('resultArea','请输入提示词','error');return;}const c=getImageCount();const t=ps.length*c;if(t>20&&!confirm(`即将生成${t}张，确定？`))return;setButtonsDisabled(true,`生成中(0/${t})...`);batchResults=[];let g=0;ps.forEach((p,pi)=>{for(let i=0;i<c;i++)batchResults.push({id:g++,prompt:p,promptIndex:pi,imageIndex:i,status:'loading',imageData:null,error:null});});batchCompleted=0;batchTotal=t;renderBatchResults();const promises=batchResults.map((item,i)=>generateOneImage(k,item.prompt,i));await Promise.allSettled(promises);setButtonsDisabled(false);}
async function generateOneImage(apiKey,prompt,index){try{const parts=[{text:prompt}];referenceImagesData.forEach(img=>{parts.push({inlineData:{mimeType:img.mimeType,data:img.data}});});const payload={contents:[{parts,role:"user"}],generationConfig:{responseModalities:["TEXT","IMAGE"],imageConfig:{aspectRatio:document.getElementById('aspectRatio').value,imageSize:document.getElementById('imageSize').value}}};const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey,payload})});if(!r.ok)throw new Error(`API错误:${r.status}`);const result=await r.json();const img=extractImageFromResponse(result);if(!img)throw new Error('未返回图像');batchResults[index].status='success';batchResults[index].imageData=img;}catch(e){batchResults[index].status='error';batchResults[index].error=e.message;}finally{batchCompleted++;setButtonsDisabled(true,`生成中(${batchCompleted}/${batchTotal})...`);renderBatchResults();}}
function extractImageFromResponse(r){if(!r||!r.candidates||!r.candidates.length)return null;for(const p of(r.candidates[0].content||{}).parts||[]){if(p.inlineData&&p.inlineData.data)return p.inlineData.data;}return null;}
function renderBatchResults(){const a=document.getElementById('resultArea');const sc=batchResults.filter(r=>r.status==='success').length;const ec=batchResults.filter(r=>r.status==='error').length;const lc=batchResults.filter(r=>r.status==='loading').length;const pp=batchTotal>0?(batchCompleted/batchTotal*100):0;let h=`<div class="section"><div class="section-title">✨ 结果</div><div class="batch-progress"><div class="progress-bar"><div class="progress-bar-fill" style="width:${pp}%"></div></div><div class="progress-text">${lc>0?`生成中...${batchCompleted}/${batchTotal}`:`完成 ${batchCompleted}/${batchTotal}`}</div><div class="batch-summary"><div class="batch-summary-item total"><div class="number">${batchTotal}</div><div class="label">总数</div></div><div class="batch-summary-item success"><div class="number">${sc}</div><div class="label">成功</div></div><div class="batch-summary-item error"><div class="number">${ec}</div><div class="label">失败</div></div></div></div>${sc>0?`<div style="margin-bottom:15px;"><button class="btn btn-primary" onclick="downloadAllImages()">💾 下载全部(${sc}张)</button></div>`:''}<div class="batch-results">`;batchResults.forEach((r,i)=>{const st=r.status==='loading'?'生成中':r.status==='success'?'成功':'失败';const c=getImageCount();const title=(currentMode==='single'||c===1)?`图片${i+1}`:`提示词${r.promptIndex+1}-图${r.imageIndex+1}`;let body='';if(r.status==='loading')body='<div class="loading-placeholder"><div class="spinner"></div></div>';else if(r.status==='success')body=`<img src="data:image/png;base64,${r.imageData}" class="result-card-image"><div class="result-card-actions"><button class="btn download-btn" onclick="downloadSingleImage(${i})">💾</button><button class="btn btn-secondary" onclick="copySingleImage(${i})">📋</button></div>`;else body=`<div class="error-message">❌ ${r.error}</div>`;h+=`<div class="result-card"><div class="result-card-header"><span>${title}</span><span class="result-card-status ${r.status}">${st}</span></div><div class="result-card-body"><div class="result-card-prompt">${escapeHtml(r.prompt)}</div>${body}</div></div>`;});h+='</div></div>';a.innerHTML=h;}
function downloadSingleImage(i){const r=batchResults[i];if(r&&r.imageData){const a=document.createElement('a');a.download=`banana_p${(r.promptIndex||0)+1}_img${(r.imageIndex||0)+1}_${Date.now()}.png`;a.href=`data:image/png;base64,${r.imageData}`;a.click();}}
async function copySingleImage(i){const r=batchResults[i];if(r&&r.imageData){try{const resp=await fetch(`data:image/png;base64,${r.imageData}`);const blob=await resp.blob();await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);alert('已复制！');}catch(e){alert('复制失败');}}}
async function downloadAllImages(){for(const r of batchResults.filter(r=>r.status==='success')){const a=document.createElement('a');a.download=`banana_p${(r.promptIndex||0)+1}_img${(r.imageIndex||0)+1}_${Date.now()}.png`;a.href=`data:image/png;base64,${r.imageData}`;a.click();await new Promise(r=>setTimeout(r,300));}}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function showAlert(id,msg,type){const e=document.getElementById(id);e.innerHTML=`<div class="alert alert-${type==='success'?'success':'error'}">${msg}</div>`;setTimeout(()=>{e.innerHTML='';},3000);}
</script>
</body>
</html>
