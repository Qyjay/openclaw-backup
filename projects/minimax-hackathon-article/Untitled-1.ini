| **O16** | 传统故事 | 参观武侯祠，了解到诸葛亮「三顾茅庐」和刘备托孤的故事，印象深刻 |
| **O17** | 学习朋友的好习惯 | 朋友有个好习惯：擅长规划事情，引出比如出去旅游每天都会做好规划，每天晚上回酒店记旅行日记/整理照片，你想学 |
