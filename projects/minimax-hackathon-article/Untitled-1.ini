
## 🔥 强匹配（自然融入，完全不违和）— 14 题

| # | 话题 | 故事切入角度 |
|---|------|-------------|
| **P1** | 擅长做计划的人 | 朋友做了超详细的成都攻略：几号去哪、几点吃什么、路线怎么走，精确到小时 |
| **P5** | 机智解决问题的人 | 旅途中出问题（酒店忘记预订/错过高铁/在某个山里景点找不到路/弄丢手机），朋友冷静用备选方案解决 |
| **P6** | 乐于助人的人 | 朋友一路帮你拿行李、帮迷路的外国游客指路、帮店家翻译菜单、弄丢手机帮我找回 |
| **P9** | 重要的好朋友 | 核心主角——一起旅行的好朋友，这次旅行加深了友谊 |
| **E5** | 自驾/骑行旅行 | 在成都租车自驾去都江堰/武侯祠，沿途风景很美 |
| **E7** | 鼓励别人做不愿做的事 | 朋友不敢吃辣/恐高，你鼓励他尝试超辣火锅 or 青城山索道 |
| **E9** | 迷路 | 在宽窄巷子/锦里附近的老巷子里迷路，没信号，靠问路才走出来 |
| **E10** | 和亲友享受的晚餐 | 和朋友在成都吃火锅——点了毛肚、鸭肠、黄喉，辣到飙泪但超爽 |
| **E11** | 想再去一次的远行 | 成都之行太美好了，还有很多没玩到的，想再去一次 |
| **E14** | 第一次尝试的兴奋活动 | 第一次看到大熊猫/第一次出门和朋友出去旅游/第一次吃到正宗的火锅 |
| **E18** | 第一次用外语 | 在熊猫基地/武侯祠 遇到外国游客，用英语帮他们指路或聊天 |
| **L4** | 自然之地 | 武侯祠 / 都江堰|
| **O5** | 有趣的建筑 | 成都 IFS 楼顶的巨型熊猫雕塑 / 武侯祠的古建筑群 / 太古里古今融合 |
| **O11** | 想多了解的野生动物 | 大熊猫！在熊猫基地看到了熊猫吃竹子、打滚，想了解它们的保护现状 |

