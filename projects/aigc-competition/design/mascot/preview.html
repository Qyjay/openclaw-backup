<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🫧 涟漪 Ripple — 吉祥物设计 v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #FDF8F3;
            padding: 40px 20px;
            color: #2C1F14;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 { font-size: 32px; margin-bottom: 8px; }
        .header p { color: #999; font-size: 15px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
        .card img { width: 100%; display: block; }
        .card-label {
            padding: 16px 20px;
            text-align: center;
        }
        .card-label .num {
            display: inline-block;
            background: #E8855A;
            color: white;
            width: 28px; height: 28px;
            border-radius: 50%;
            line-height: 28px;
            font-weight: 700;
            font-size: 14px;
            margin-right: 8px;
        }
        .card-label span { font-size: 15px; font-weight: 600; }
        .divider {
            max-width: 1000px;
            margin: 48px auto 32px;
            border: none;
            border-top: 1px solid #eee;
        }
        .old-section {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }
        .old-section h2 { font-size: 18px; color: #999; margin-bottom: 16px; }
        .old-card {
            display: inline-block;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            overflow: hidden;
            max-width: 300px;
            opacity: 0.6;
        }
        .old-card img { width: 100%; display: block; }
        .old-card .card-label { padding: 10px; font-size: 13px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🫧 涟漪 Ripple — v3 候选</h1>
        <p>极简手绘风 · 点点眼 + 一笔嘴 · 4 选 1（点击放大）</p>
    </div>

    <div class="grid">
        <div class="card" onclick="window.open('ripple-v2-1.png')">
            <img src="ripple-v3-1.png" alt="v3-1">
            <div class="card-label"><span class="num">1</span><span>候选 A</span></div>
        </div>
        <div class="card" onclick="window.open('ripple-v3-2.png')">
            <img src="ripple-v3-2.png" alt="v3-2">
            <div class="card-label"><span class="num">2</span><span>候选 B</span></div>
        </div>
        <div class="card" onclick="window.open('ripple-v3-3.png')">
            <img src="ripple-v3-3.png" alt="v3-3">
            <div class="card-label"><span class="num">3</span><span>候选 C</span></div>
        </div>
        <div class="card" onclick="window.open('ripple-v3-4.png')">
            <img src="ripple-v3-4.png" alt="v3-4">
            <div class="card-label"><span class="num">4</span><span>候选 D</span></div>
        </div>
    </div>

    <hr class="divider">

    <div class="old-section">
        <h2>历史版本（已淘汰）</h2>
        <div class="old-card" style="margin-right:12px">
            <img src="ripple-v1.png" alt="v1">
            <div class="card-label">v1 · 写实风</div>
        </div>
        <div class="old-card">
            <img src="ripple-v2-1.png" alt="v2">
            <div class="card-label">v2 · 二次元（太拟人）</div>
        </div>
    </div>
</body>
</html>
