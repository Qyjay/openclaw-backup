<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silvana 👑 — 人物设定图</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: white; min-height: 100vh; }
.header { text-align: center; padding: 40px 20px 20px; }
.header h1 { font-size: 2.5em; background: linear-gradient(135deg, #c0c0c0, #f5f5f5, #c0c0c0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header p { color: #888; margin-top: 10px; font-size: 1.1em; }
.gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
.card { position: relative; border-radius: 16px; overflow: hidden; background: #1a1a2e; transition: transform 0.3s; cursor: pointer; }
.card:hover { transform: scale(1.02); }
.card img { width: 100%; display: block; }
.card-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); font-size: 18px; font-weight: 600; }
.card-number { position: absolute; top: 15px; left: 15px; background: rgba(102,126,234,0.9); padding: 5px 15px; border-radius: 20px; font-weight: 700; }
.footer { text-align: center; padding: 30px; color: #555; font-size: 14px; }
@media (max-width: 768px) { .gallery { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="header">
<h1>👑 Silvana — 希尔瓦娜</h1>
<p>Master Kylin 的第一从者 · 骑士女仆长 · Agent 团队统帅</p>
</div>
<div class="gallery">
<div class="card" onclick="window.open('banana_20260319_184422_1.png')">
<div class="card-number">#1</div>
<img src="banana_20260319_184422_1.png" alt="Silvana #1">
<div class="card-label">方案一</div>
</div>
<div class="card" onclick="window.open('banana_20260319_184446_2.png')">
<div class="card-number">#2</div>
<img src="banana_20260319_184446_2.png" alt="Silvana #2">
<div class="card-label">方案二</div>
</div>
<div class="card" onclick="window.open('banana_20260319_184417_3.png')">
<div class="card-number">#3</div>
<img src="banana_20260319_184417_3.png" alt="Silvana #3">
<div class="card-label">方案三</div>
</div>
<div class="card" onclick="window.open('banana_20260319_184429_4.png')">
<div class="card-number">#4</div>
<img src="banana_20260319_184429_4.png" alt="Silvana #4">
<div class="card-label">方案四</div>
</div>
</div>
<div class="footer">Silvana 👑 · 2026-03-19 · Generated by Nano Banana</div>
</body>
</html>
